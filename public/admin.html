<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Адмін — Beauty Black Room</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #FF4FA3; --purple: #9D4FFF;
      --bg: #0a0a0a; --surface: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08); --text: rgba(255,255,255,.85);
      --muted: rgba(255,255,255,.4);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; min-height: 100vh; }

    /* LOGIN */
    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-box { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 20px; padding: 48px; width: 100%; max-width: 380px; text-align: center; }
    .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; margin-bottom: 8px; background: linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-sub { color: var(--muted); font-size: .8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
    .field { margin-bottom: 16px; text-align: left; }
    .field label { display: block; font-size: .75rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .field input { width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 10px; font-family: 'Jost', sans-serif; font-size: .9rem; outline: none; transition: border-color .3s; }
    .field input:focus { border-color: rgba(255,79,163,.5); }
    .btn-login { width: 100%; background: linear-gradient(135deg,var(--pink),var(--purple)); border: none; color: #fff; padding: 14px; border-radius: 10px; font-family: 'Jost', sans-serif; font-size: .9rem; letter-spacing: 1.5px; cursor: pointer; margin-top: 8px; transition: opacity .3s; }
    .btn-login:hover { opacity: .85; }
    .login-err { color: #ff6b6b; font-size: .8rem; margin-top: 12px; min-height: 20px; }

    /* ADMIN LAYOUT */
    #adminApp { display: none; min-height: 100vh; }
    .admin-header { background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); }
    .admin-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; background: linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .admin-nav { display: flex; gap: 4px; }
    .admin-nav-btn { background: transparent; border: none; color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: .85rem; transition: all .3s; }
    .admin-nav-btn:hover, .admin-nav-btn.active { background: rgba(255,79,163,.12); color: var(--pink); }
    .btn-logout { background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: .8rem; transition: all .3s; }
    .btn-logout:hover { border-color: rgba(255,79,163,.4); color: #fff; }

    .admin-body { padding: 32px; max-width: 1400px; margin: 0 auto; }

    /* SECTIONS */
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; }

    /* BUTTON */
    .btn-primary { background: linear-gradient(135deg,var(--pink),var(--purple)); border: none; color: #fff; padding: 10px 24px; border-radius: 10px; font-family: 'Jost', sans-serif; font-size: .85rem; letter-spacing: 1px; cursor: pointer; transition: opacity .3s; }
    .btn-primary:hover { opacity: .85; }
    .btn-danger { background: rgba(255,60,60,.15); border: 1px solid rgba(255,60,60,.3); color: #ff6b6b; padding: 6px 14px; border-radius: 8px; font-family: 'Jost', sans-serif; font-size: .75rem; cursor: pointer; transition: all .3s; }
    .btn-danger:hover { background: rgba(255,60,60,.25); }
    .btn-edit { background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; font-family: 'Jost', sans-serif; font-size: .75rem; cursor: pointer; transition: all .3s; }
    .btn-edit:hover { border-color: rgba(255,79,163,.4); color: var(--pink); }

    /* PRODUCTS TABLE */
    .products-table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: rgba(255,255,255,.03); padding: 14px 20px; text-align: left; font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .2s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.02); }
    tbody td { padding: 14px 20px; font-size: .88rem; vertical-align: middle; }
    .td-img { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
    .td-name { font-weight: 500; max-width: 200px; }
    .td-price { font-weight: 600; white-space: nowrap; }
    .td-cat { font-size: .75rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    .badge-in { background: rgba(79,255,157,.1); color: #4fff9d; font-size: .7rem; padding: 3px 10px; border-radius: 50px; letter-spacing: 1px; }
    .badge-out { background: rgba(255,255,255,.05); color: var(--muted); font-size: .7rem; padding: 3px 10px; border-radius: 50px; letter-spacing: 1px; }
    .td-actions { display: flex; gap: 8px; }
    .table-empty { text-align: center; padding: 60px; color: var(--muted); }
    .table-loading { text-align: center; padding: 60px; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(255,79,163,.2); border-top-color: var(--pink); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal { background: #111; border: 1px solid var(--border); border-radius: 20px; padding: 36px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; margin-bottom: 28px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .modal-grid .field.full { grid-column: 1 / -1; }
    .field textarea { width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: .88rem; outline: none; resize: vertical; min-height: 80px; transition: border-color .3s; }
    .field textarea:focus { border-color: rgba(255,79,163,.5); }
    .field select { width: 100%; background: #1a1a1a; border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 10px; font-family: 'Jost', sans-serif; font-size: .88rem; outline: none; cursor: pointer; }
    .field select:focus { border-color: rgba(255,79,163,.5); }
    .checkbox-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; }
    .checkbox-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--pink); cursor: pointer; }
    .checkbox-row label { font-size: .88rem; cursor: pointer; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 24px; border-radius: 10px; font-family: 'Jost', sans-serif; font-size: .85rem; cursor: pointer; transition: all .3s; }
    .btn-cancel:hover { border-color: rgba(255,255,255,.2); color: #fff; }

    /* UPLOAD */
    .upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .3s; margin-bottom: 12px; }
    .upload-area:hover { border-color: rgba(255,79,163,.4); }
    .upload-area input { display: none; }
    .upload-area p { color: var(--muted); font-size: .85rem; margin-top: 8px; }
    .upload-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .upload-preview-item { position: relative; width: 72px; height: 72px; }
    .upload-preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
    .upload-preview-item button { position: absolute; top: -6px; right: -6px; background: #ff4444; border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .stat-label { font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; background: linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* TOAST */
    .admin-toast { position: fixed; bottom: 32px; right: 32px; background: rgba(20,20,20,.95); border: 1px solid var(--border); border-radius: 12px; padding: 14px 22px; font-size: .88rem; z-index: 9999; transform: translateY(20px); opacity: 0; transition: all .3s; max-width: 320px; }
    .admin-toast.show { transform: translateY(0); opacity: 1; }
    .admin-toast.success { border-color: rgba(79,255,157,.3); color: #4fff9d; }
    .admin-toast.error { border-color: rgba(255,60,60,.3); color: #ff6b6b; }

    @media (max-width: 768px) { .admin-body { padding: 20px; } .modal-grid { grid-template-columns: 1fr; } .admin-header { flex-wrap: wrap; gap: 12px; } }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo">Beauty Black Room</div>
      <div class="login-sub">Адмін панель</div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" />
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn-login" id="loginBtn">Увійти</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>

  <!-- ADMIN APP -->
  <div id="adminApp">
    <header class="admin-header">
      <div class="admin-brand">BR Admin</div>
      <div class="admin-nav">
        <button class="admin-nav-btn active" data-section="dashboard">Дашборд</button>
        <button class="admin-nav-btn" data-section="products">Товари</button>
        <button class="admin-nav-btn" data-section="categories">Категорії</button>
      </div>
      <button class="btn-logout" id="logoutBtn">Вийти</button>
    </header>

    <div class="admin-body">

      <!-- DASHBOARD -->
      <div class="admin-section active" id="section-dashboard">
        <div class="section-head"><h2 class="section-title">Дашборд</h2></div>
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card"><div class="stat-label">Всього товарів</div><div class="stat-value" id="statTotal">—</div></div>
          <div class="stat-card"><div class="stat-label">В наявності</div><div class="stat-value" id="statInStock">—</div></div>
          <div class="stat-card"><div class="stat-label">Хіти</div><div class="stat-value" id="statFeatured">—</div></div>
          <div class="stat-card"><div class="stat-label">Категорій</div><div class="stat-value" id="statCats">—</div></div>
        </div>
        <div style="color:var(--muted);font-size:.85rem;line-height:1.8;">
          <p>Сайт: <a href="/" style="color:var(--pink);">Відкрити</a></p>
          <p>Каталог: <a href="/products.html" style="color:var(--pink);">Відкрити</a></p>
        </div>
      </div>

      <!-- PRODUCTS -->
      <div class="admin-section" id="section-products">
        <div class="section-head">
          <h2 class="section-title">Товари</h2>
          <button class="btn-primary" id="addProductBtn">+ Додати товар</button>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
          <input id="adminSearch" type="text" placeholder="Пошук за назвою..." style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#fff;padding:8px 16px;border-radius:8px;font-family:Jost,sans-serif;font-size:.85rem;outline:none;flex:1;min-width:200px;" />
          <select id="adminCatSelect" style="background:#1a1a1a;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.7);padding:8px 16px;border-radius:8px;font-family:Jost,sans-serif;font-size:.85rem;outline:none;cursor:pointer;">
            <option value="">Всі категорії</option>
            <option value="face">Обличчя</option>
            <option value="hair">Волосся</option>
            <option value="body">Тіло</option>
            <option value="men">Чоловіки</option>
            <option value="perfumes">Парфуми</option>
            <option value="home">Дім</option>
            <option value="kids">Діти</option>
            <option value="sale">Розпродаж</option>
          </select>
        </div>
        <div class="products-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Фото</th>
                <th>Назва</th>
                <th>Категорія</th>
                <th>Ціна</th>
                <th>Наявність</th>
                <th>Дії</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <tr><td colspan="6" class="table-loading"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- CATEGORIES -->
      <div class="admin-section" id="section-categories">
        <div class="section-head">
          <h2 class="section-title">Категорії</h2>
          <button class="btn-primary" id="addCatBtn">+ Додати категорію</button>
        </div>
        <div class="products-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Назва</th>
                <th>Slug</th>
                <th>Порядок</th>
                <th>Дії</th>
              </tr>
            </thead>
            <tbody id="catsTableBody">
              <tr><td colspan="4" class="table-loading"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <h3 class="modal-title" id="modalTitle">Новий товар</h3>
      <input type="hidden" id="editId" />
      <div class="modal-grid">
        <div class="field full">
          <label>Назва *</label>
          <input type="text" id="pName" placeholder="Louis Vuitton Fantasmagory" />
        </div>
        <div class="field">
          <label>Ціна (₴) *</label>
          <input type="number" id="pPrice" placeholder="1880" min="0" />
        </div>
        <div class="field">
          <label>Категорія *</label>
          <select id="pCategory">
            <option value="">Оберіть...</option>
            <option value="cosmetics">Косметика</option>
            <option value="perfumes">Парфуми</option>
            <option value="care">Догляд</option>
            <option value="hair">Волосся</option>
            <option value="gifts">Подарунки</option>
          </select>
        </div>
        <div class="field full">
          <label>Опис</label>
          <textarea id="pDesc" placeholder="Короткий опис товару..."></textarea>
        </div>
        <div class="field full">
          <label>Фото товару</label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*" multiple />
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Натисніть або перетягніть фото</p>
          </div>
          <div class="upload-preview" id="uploadPreview"></div>
          <div id="uploadProgress" style="color:rgba(255,79,163,.7);font-size:.8rem;min-height:20px;"></div>
        </div>
        <div class="field full">
          <div class="checkbox-row">
            <input type="checkbox" id="pInStock" checked />
            <label for="pInStock">В наявності</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="pFeatured" />
            <label for="pFeatured">Позначити як хіт</label>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">Скасувати</button>
        <button class="btn-primary" id="modalSave">Зберегти</button>
      </div>
    </div>
  </div>

  <!-- CATEGORY MODAL -->
  <div class="modal-overlay" id="catModal">
    <div class="modal" style="max-width:400px;">
      <h3 class="modal-title" id="catModalTitle">Нова категорія</h3>
      <input type="hidden" id="catEditId" />
      <div class="field">
        <label>Назва *</label>
        <input type="text" id="cName" placeholder="Косметика" />
      </div>
      <div class="field">
        <label>Slug *</label>
        <input type="text" id="cSlug" placeholder="cosmetics" />
      </div>
      <div class="field">
        <label>Порядок</label>
        <input type="number" id="cOrder" placeholder="0" value="0" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="catModalCancel">Скасувати</button>
        <button class="btn-primary" id="catModalSave">Зберегти</button>
      </div>
    </div>
  </div>

  <div class="admin-toast" id="adminToast"></div>

  <script type="module">
    import {
      db, auth, storage,
      collection, getDocs, doc, getDoc, orderBy, query, limit, where,
      signInWithEmailAndPassword, signOut, onAuthStateChanged,
      ref, uploadBytes, getDownloadURL
    } from './js/firebase-client.js';
    import {
      addDoc, updateDoc, deleteDoc, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';

    const CATEGORY_LABELS = {
      face: 'Обличчя', hair: 'Волосся', body: 'Тіло',
      men: 'Чоловіки', perfumes: 'Парфуми', home: 'Дім',
      kids: 'Діти', sale: 'Розпродаж'
    };

    let products = [];
    let categories = [];
    let uploadedImages = []; // URLs після завантаження

    // ─── AUTH ────────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        loadDashboard();
        loadProducts();
        loadCategories();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminApp').style.display = 'none';
      }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPassword').value;
      document.getElementById('loginErr').textContent = '';
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (err) {
        document.getElementById('loginErr').textContent = 'Невірний email або пароль';
      }
    });

    document.getElementById('loginPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    // ─── NAVIGATION ──────────────────────────────────────────
    document.querySelectorAll('.admin-nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`section-${btn.dataset.section}`).classList.add('active');
      });
    });

    // ─── DASHBOARD ───────────────────────────────────────────
    async function loadDashboard() {
      try {
        // Рахуємо тільки перші 1000 для швидкості
        const [pSnap, cSnap] = await Promise.all([
          getDocs(query(collection(db, 'products'), limit(1000))),
          getDocs(collection(db, 'categories')),
        ]);
        const prods = pSnap.docs.map(d => d.data());
        document.getElementById('statTotal').textContent = pSnap.size + (pSnap.size === 1000 ? '+' : '');
        document.getElementById('statInStock').textContent = prods.filter(p => p.inStock !== false).length;
        document.getElementById('statFeatured').textContent = prods.filter(p => p.featured).length;
        document.getElementById('statCats').textContent = cSnap.size;
      } catch(err) { console.error(err); }
    }

    // ─── PRODUCTS ─────────────────────────────────────────────
    let adminSearchTerm = '';
    let adminCatFilter = '';
    const PAGE_SIZE = 50;

    async function loadProducts() {
      const tbody = document.getElementById('productsTableBody');
      tbody.innerHTML = '<tr><td colspan="6" class="table-loading"><div class="spinner"></div></td></tr>';
      try {
        let q = query(collection(db, 'products'), limit(PAGE_SIZE));
        if (adminCatFilter) q = query(collection(db, 'products'), where('category', '==', adminCatFilter), limit(PAGE_SIZE));
        const snap = await getDocs(q);
        products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderProductsTable();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" class="table-empty">Помилка: ${err.message}</td></tr>`;
        console.error(err);
      }
    }

    function renderProductsTable() {
      const tbody = document.getElementById('productsTableBody');
      let filtered = products;
      if (adminSearchTerm) filtered = filtered.filter(p => p.name?.toLowerCase().includes(adminSearchTerm));
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="table-empty">Товарів не знайдено</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(p => `
        <tr>
          <td><img class="td-img" src="${p.images?.[0] || ''}" alt="${p.name}" onerror="this.style.display='none'" /></td>
          <td class="td-name">${p.name}</td>
          <td class="td-cat">${CATEGORY_LABELS[p.category] || p.category}</td>
          <td class="td-price">${(p.price || 0).toLocaleString('uk-UA')} ₴</td>
          <td><span class="${p.inStock !== false ? 'badge-in' : 'badge-out'}">${p.inStock !== false ? 'Є' : 'Немає'}</span></td>
          <td><div class="td-actions">
            <button class="btn-edit" onclick="editProduct('${p.id}')">Ред.</button>
            <button class="btn-danger" onclick="deleteProduct('${p.id}','${p.name}')">Вид.</button>
          </div></td>
        </tr>`).join('');
    }

    // ─── PRODUCT MODAL ────────────────────────────────────────
    function openProductModal(p = null) {
      uploadedImages = p?.images ? [...p.images] : [];
      document.getElementById('editId').value = p?.id || '';
      document.getElementById('modalTitle').textContent = p ? 'Редагувати товар' : 'Новий товар';
      document.getElementById('pName').value = p?.name || '';
      document.getElementById('pPrice').value = p?.price || '';
      document.getElementById('pCategory').value = p?.category || '';
      document.getElementById('pDesc').value = p?.description || '';
      document.getElementById('pInStock').checked = p?.inStock !== false;
      document.getElementById('pFeatured').checked = p?.featured || false;
      renderUploadPreview();
      document.getElementById('productModal').classList.add('open');
    }

    function closeProductModal() {
      document.getElementById('productModal').classList.remove('open');
      uploadedImages = [];
      document.getElementById('uploadPreview').innerHTML = '';
      document.getElementById('uploadProgress').textContent = '';
    }

    document.getElementById('addProductBtn').addEventListener('click', () => openProductModal());

    document.getElementById('adminSearch').addEventListener('input', e => {
      adminSearchTerm = e.target.value.toLowerCase().trim();
      renderProductsTable();
    });

    document.getElementById('adminCatSelect').addEventListener('change', e => {
      adminCatFilter = e.target.value;
      loadProducts();
    });
    document.getElementById('modalCancel').addEventListener('click', closeProductModal);
    document.getElementById('productModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeProductModal();
    });

    window.editProduct = id => {
      const p = products.find(x => x.id === id);
      if (p) openProductModal(p);
    };

    window.deleteProduct = async (id, name) => {
      if (!confirm(`Видалити "${name}"?`)) return;
      try {
        await deleteDoc(doc(db, 'products', id));
        toast('Товар видалено', 'success');
        loadProducts();
        loadDashboard();
      } catch (err) {
        toast(err.message, 'error');
      }
    };

    // ─── FILE UPLOAD ──────────────────────────────────────────
    document.getElementById('uploadArea').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', e => {
      handleFiles(Array.from(e.target.files));
    });

    document.getElementById('uploadArea').addEventListener('dragover', e => {
      e.preventDefault();
      e.currentTarget.style.borderColor = 'rgba(255,79,163,.6)';
    });
    document.getElementById('uploadArea').addEventListener('dragleave', e => {
      e.currentTarget.style.borderColor = 'rgba(255,255,255,.08)';
    });
    document.getElementById('uploadArea').addEventListener('drop', e => {
      e.preventDefault();
      e.currentTarget.style.borderColor = 'rgba(255,255,255,.08)';
      handleFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
    });

    async function handleFiles(files) {
      const prog = document.getElementById('uploadProgress');
      prog.textContent = `Завантаження ${files.length} фото...`;
      for (const file of files) {
        try {
          const storageRef = ref(storage, `products/${Date.now()}_${file.name}`);
          const snap = await uploadBytes(storageRef, file);
          const url = await getDownloadURL(snap.ref);
          uploadedImages.push(url);
          renderUploadPreview();
        } catch (err) {
          toast(`Помилка: ${err.message}`, 'error');
        }
      }
      prog.textContent = '';
    }

    function renderUploadPreview() {
      document.getElementById('uploadPreview').innerHTML = uploadedImages.map((url, i) => `
        <div class="upload-preview-item">
          <img src="${url}" alt="preview" />
          <button onclick="removeImage(${i})">✕</button>
        </div>`).join('');
    }

    window.removeImage = i => {
      uploadedImages.splice(i, 1);
      renderUploadPreview();
    };

    // ─── SAVE PRODUCT ─────────────────────────────────────────
    document.getElementById('modalSave').addEventListener('click', async () => {
      const id = document.getElementById('editId').value;
      const name = document.getElementById('pName').value.trim();
      const price = document.getElementById('pPrice').value;
      const category = document.getElementById('pCategory').value;
      if (!name || !price || !category) {
        toast('Заповніть всі обовʼязкові поля', 'error'); return;
      }
      const data = {
        name, price: Number(price), category,
        description: document.getElementById('pDesc').value.trim(),
        images: uploadedImages,
        inStock: document.getElementById('pInStock').checked,
        featured: document.getElementById('pFeatured').checked,
      };
      try {
        if (id) {
          await updateDoc(doc(db, 'products', id), { ...data, updatedAt: new Date().toISOString() });
          toast('Товар оновлено', 'success');
        } else {
          data.createdAt = new Date().toISOString();
          await addDoc(collection(db, 'products'), data);
          toast('Товар додано', 'success');
        }
        closeProductModal();
        loadProducts();
        loadDashboard();
      } catch (err) {
        toast(err.message, 'error');
      }
    });

    // ─── CATEGORIES ───────────────────────────────────────────
    async function loadCategories() {
      try {
        const snap = await getDocs(query(collection(db, 'categories'), orderBy('order')));
        categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch {
        categories = [];
      }
      renderCatsTable();
    }

    function renderCatsTable() {
      const tbody = document.getElementById('catsTableBody');
      if (!categories.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="table-empty">Категорій ще немає</td></tr>'; return;
      }
      tbody.innerHTML = categories.map(c => `
        <tr>
          <td>${c.name}</td>
          <td style="color:var(--muted);font-size:.8rem;">${c.slug}</td>
          <td>${c.order ?? 0}</td>
          <td><div class="td-actions">
            <button class="btn-edit" onclick="editCat('${c.id}')">Ред.</button>
            <button class="btn-danger" onclick="deleteCat('${c.id}','${c.name}')">Вид.</button>
          </div></td>
        </tr>`).join('');
    }

    function openCatModal(c = null) {
      document.getElementById('catEditId').value = c?.id || '';
      document.getElementById('catModalTitle').textContent = c ? 'Редагувати категорію' : 'Нова категорія';
      document.getElementById('cName').value = c?.name || '';
      document.getElementById('cSlug').value = c?.slug || '';
      document.getElementById('cOrder').value = c?.order ?? 0;
      document.getElementById('catModal').classList.add('open');
    }

    document.getElementById('addCatBtn').addEventListener('click', () => openCatModal());
    document.getElementById('catModalCancel').addEventListener('click', () => document.getElementById('catModal').classList.remove('open'));
    document.getElementById('catModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) document.getElementById('catModal').classList.remove('open');
    });

    window.editCat = id => { const c = categories.find(x => x.id === id); if (c) openCatModal(c); };

    window.deleteCat = async (id, name) => {
      if (!confirm(`Видалити категорію "${name}"?`)) return;
      await deleteDoc(doc(db, 'categories', id));
      toast('Категорію видалено', 'success');
      loadCategories();
      loadDashboard();
    };

    document.getElementById('catModalSave').addEventListener('click', async () => {
      const id = document.getElementById('catEditId').value;
      const name = document.getElementById('cName').value.trim();
      const slug = document.getElementById('cSlug').value.trim();
      if (!name || !slug) { toast('Назва та slug обовʼязкові', 'error'); return; }
      const data = { name, slug, order: Number(document.getElementById('cOrder').value) || 0 };
      try {
        if (id) {
          await updateDoc(doc(db, 'categories', id), data);
          toast('Категорію оновлено', 'success');
        } else {
          await addDoc(collection(db, 'categories'), data);
          toast('Категорію додано', 'success');
        }
        document.getElementById('catModal').classList.remove('open');
        loadCategories();
        loadDashboard();
      } catch (err) {
        toast(err.message, 'error');
      }
    });

    // ─── TOAST ────────────────────────────────────────────────
    function toast(msg, type = 'success') {
      const el = document.getElementById('adminToast');
      el.textContent = msg;
      el.className = `admin-toast show ${type}`;
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
