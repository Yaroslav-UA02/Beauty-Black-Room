<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Адмін — Beauty Black Room</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
  
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo">Beauty Black Room</div>
      <div class="login-sub">Адмін панель</div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" />
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn-login" id="loginBtn">Увійти</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>

  <!-- ADMIN APP -->
  <div id="adminApp">
    <header class="admin-header">
      <div class="admin-brand">BR Admin</div>
      <div class="admin-nav">
        <button class="admin-nav-btn active" data-section="dashboard">Дашборд</button>
        <button class="admin-nav-btn" data-section="products">Товари</button>
        <button class="admin-nav-btn" data-section="categories">Категорії</button>
      </div>
      <button class="btn-logout" id="logoutBtn">Вийти</button>
    </header>

    <div class="admin-body">

      <!-- DASHBOARD -->
      <div class="admin-section active" id="section-dashboard">
        <div class="section-head"><h2 class="section-title">Дашборд</h2></div>
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card"><div class="stat-label">Всього товарів</div><div class="stat-value" id="statTotal">—</div></div>
          <div class="stat-card"><div class="stat-label">В наявності</div><div class="stat-value" id="statInStock">—</div></div>
          <div class="stat-card"><div class="stat-label">Хіти</div><div class="stat-value" id="statFeatured">—</div></div>
          <div class="stat-card"><div class="stat-label">Категорій</div><div class="stat-value" id="statCats">—</div></div>
        </div>
        <div style="color:var(--muted);font-size:.85rem;line-height:1.8;">
          <p>Сайт: <a href="/" style="color:var(--pink);">Відкрити</a></p>
          <p>Каталог: <a href="/products.html" style="color:var(--pink);">Відкрити</a></p>
        </div>
      </div>

      <!-- PRODUCTS -->
      <div class="admin-section" id="section-products">
        <div class="section-head">
          <h2 class="section-title">Товари</h2>
          <button class="btn-primary" id="addProductBtn">+ Додати товар</button>
        </div>
        <div id="adminFiltersBar" style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
          <input id="adminSearch" type="text" placeholder="Пошук за назвою..." style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#fff;padding:8px 16px;border-radius:8px;font-family:Jost,sans-serif;font-size:.85rem;outline:none;flex:1;min-width:160px;" />
          <select id="adminCatSelect" style="background:#1a1a1a;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.7);padding:8px 16px;border-radius:8px;font-family:Jost,sans-serif;font-size:.85rem;outline:none;cursor:pointer;min-width:140px;">
            <option value="">Всі категорії</option>
            <option value="face">Обличчя</option>
            <option value="hair">Волосся</option>
            <option value="body">Тіло</option>
            <option value="men">Чоловіки</option>
            <option value="perfumes">Парфуми</option>
            <option value="home">Дім</option>
            <option value="kids">Діти</option>
            <option value="sale">Розпродаж</option>
          </select>
        </div>
        <div class="products-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Фото</th>
                <th>Назва</th>
                <th>Категорія</th>
                <th>Ціна</th>
                <th>Наявність</th>
                <th>Дії</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <tr><td colspan="6" class="table-loading"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- CATEGORIES -->
      <div class="admin-section" id="section-categories">
        <div class="section-head">
          <h2 class="section-title">Категорії</h2>
          <button class="btn-primary" id="addCatBtn">+ Додати категорію</button>
        </div>
        <div class="products-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Назва</th>
                <th>Slug</th>
                <th>Порядок</th>
                <th>Дії</th>
              </tr>
            </thead>
            <tbody id="catsTableBody">
              <tr><td colspan="4" class="table-loading"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <h3 class="modal-title" id="modalTitle">Новий товар</h3>
      <input type="hidden" id="editId" />
      <div class="modal-grid">
        <div class="field full">
          <label>Назва *</label>
          <input type="text" id="pName" placeholder="Louis Vuitton Fantasmagory" />
        </div>
        <div class="field">
          <label>Ціна (₴) *</label>
          <input type="number" id="pPrice" placeholder="1880" min="0" />
        </div>
        <div class="field">
          <label>Категорія *</label>
          <select id="pCategory">
            <option value="">Оберіть...</option>
            <option value="cosmetics">Косметика</option>
            <option value="perfumes">Парфуми</option>
            <option value="care">Догляд</option>
            <option value="hair">Волосся</option>
            <option value="gifts">Подарунки</option>
          </select>
        </div>
        <div class="field full">
          <label>Опис</label>
          <textarea id="pDesc" placeholder="Короткий опис товару..."></textarea>
        </div>
        <div class="field full">
          <label>Фото товару</label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*" multiple />
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Натисніть або перетягніть фото</p>
          </div>
          <div class="upload-preview" id="uploadPreview"></div>
          <div id="uploadProgress" style="color:rgba(255,79,163,.7);font-size:.8rem;min-height:20px;"></div>
        </div>
        <div class="field full">
          <div class="checkbox-row">
            <input type="checkbox" id="pInStock" checked />
            <label for="pInStock">В наявності</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="pFeatured" />
            <label for="pFeatured">Позначити як хіт</label>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">Скасувати</button>
        <button class="btn-primary" id="modalSave">Зберегти</button>
      </div>
    </div>
  </div>

  <!-- CATEGORY MODAL -->
  <div class="modal-overlay" id="catModal">
    <div class="modal" style="max-width:400px;">
      <h3 class="modal-title" id="catModalTitle">Нова категорія</h3>
      <input type="hidden" id="catEditId" />
      <div class="field">
        <label>Назва *</label>
        <input type="text" id="cName" placeholder="Косметика" />
      </div>
      <div class="field">
        <label>Slug *</label>
        <input type="text" id="cSlug" placeholder="cosmetics" />
      </div>
      <div class="field">
        <label>Порядок</label>
        <input type="number" id="cOrder" placeholder="0" value="0" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="catModalCancel">Скасувати</button>
        <button class="btn-primary" id="catModalSave">Зберегти</button>
      </div>
    </div>
  </div>

  <div class="admin-toast" id="adminToast"></div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
