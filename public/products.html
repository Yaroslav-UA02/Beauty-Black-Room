<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог товарів — Beauty Black Room</title>
  <meta name="description" content="Каталог оригінальної косметики, парфумерії та засобів догляду в Beauty Black Room Мукачево." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    .catalog-page { padding: 120px 40px 80px; min-height: 100vh; }
    .catalog-header { text-align: center; margin-bottom: 60px; }
    .catalog-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 4rem); font-weight: 300; color: #fff; margin-bottom: 12px; }
    .catalog-header p { color: rgba(255,255,255,.5); font-family: 'Jost', sans-serif; font-size: .9rem; letter-spacing: 2px; text-transform: uppercase; }

    .catalog-controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 48px; }
    .filter-btn { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); color: rgba(255,255,255,.6); padding: 8px 20px; border-radius: 50px; font-family: 'Jost', sans-serif; font-size: .8rem; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .3s; }
    .filter-btn:hover, .filter-btn.active { background: linear-gradient(135deg,#FF4FA3,#9D4FFF); border-color: transparent; color: #fff; }

    .catalog-search { display: flex; justify-content: center; margin-bottom: 40px; }
    .catalog-search input { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); color: #fff; padding: 12px 24px; border-radius: 50px; font-family: 'Jost', sans-serif; font-size: .9rem; width: 100%; max-width: 400px; outline: none; transition: border-color .3s; }
    .catalog-search input::placeholder { color: rgba(255,255,255,.3); }
    .catalog-search input:focus { border-color: rgba(255,79,163,.5); }

    .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; max-width: 1400px; margin: 0 auto; }

    .catalog-card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 16px; overflow: hidden; transition: transform .3s, border-color .3s; cursor: pointer; }
    .catalog-card:hover { transform: translateY(-6px); border-color: rgba(255,79,163,.3); }
    .catalog-card-img { aspect-ratio: 1; overflow: hidden; position: relative; }
    .catalog-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s; }
    .catalog-card:hover .catalog-card-img img { transform: scale(1.05); }
    .catalog-card-badge { position: absolute; top: 12px; left: 12px; background: linear-gradient(135deg,#FF4FA3,#9D4FFF); color: #fff; font-family: 'Jost', sans-serif; font-size: .65rem; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 50px; }
    .catalog-card-body { padding: 20px; }
    .catalog-card-cat { font-family: 'Jost', sans-serif; font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,79,163,.8); margin-bottom: 6px; }
    .catalog-card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: #fff; margin-bottom: 4px; line-height: 1.3; }
    .catalog-card-desc { font-family: 'Inter', sans-serif; font-size: .8rem; color: rgba(255,255,255,.4); margin-bottom: 16px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .catalog-card-footer { display: flex; align-items: center; justify-content: space-between; }
    .catalog-card-price { font-family: 'Jost', sans-serif; font-size: 1.1rem; font-weight: 600; color: #fff; }
    .catalog-card-price span { font-size: .75rem; font-weight: 300; color: rgba(255,255,255,.4); }
    .btn-add-cart { background: linear-gradient(135deg,#FF4FA3,#9D4FFF); border: none; color: #fff; padding: 8px 18px; border-radius: 50px; font-family: 'Jost', sans-serif; font-size: .75rem; letter-spacing: 1px; cursor: pointer; transition: opacity .3s; }
    .btn-add-cart:hover { opacity: .85; }

    .catalog-empty { text-align: center; padding: 80px 20px; color: rgba(255,255,255,.3); font-family: 'Jost', sans-serif; }
    .catalog-loading { text-align: center; padding: 80px 20px; }
    .catalog-loading .spinner { width: 40px; height: 40px; border: 2px solid rgba(255,79,163,.2); border-top-color: #FF4FA3; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .catalog-loading p { color: rgba(255,255,255,.4); font-family: 'Jost', sans-serif; font-size: .85rem; letter-spacing: 2px; }

    @media (max-width: 768px) { .catalog-page { padding: 100px 20px 60px; } .catalog-grid { gap: 16px; } }
    @media (max-width: 480px) { .catalog-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } .catalog-card-body { padding: 14px; } }
  </style>
</head>
<body>
  <div id="grain" aria-hidden="true"></div>
  <div id="cur-dot"></div>
  <div id="cur-ring"><span id="curLabel"></span></div>

  <!-- HEADER -->
  <header class="header" id="header">
    <a href="/" class="logo">
      <svg class="logo-svg" viewBox="0 0 100 100" fill="none">
        <defs><linearGradient id="hLG" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse"><stop stop-color="#FF4FA3"/><stop offset=".5" stop-color="#CF4FE8"/><stop offset="1" stop-color="#9D4FFF"/></linearGradient></defs>
        <circle cx="50" cy="50" r="47" stroke="url(#hLG)" stroke-width="1.5"/>
        <circle cx="50" cy="50" r="40" stroke="rgba(255,79,163,.12)" stroke-width=".75"/>
        <text x="50" y="57" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="28" font-weight="300" fill="white" letter-spacing="4">BR</text>
        <line x1="26" y1="64" x2="74" y2="64" stroke="url(#hLG)" stroke-width=".8"/>
        <text x="50" y="73" text-anchor="middle" font-family="Jost,system-ui,sans-serif" font-size="5" font-weight="500" fill="rgba(255,255,255,.45)" letter-spacing="3">BEAUTY · ROOM</text>
        <circle cx="50" cy="4.5" r="1.8" fill="url(#hLG)"/><circle cx="50" cy="95.5" r="1.8" fill="url(#hLG)"/><circle cx="4.5" cy="50" r="1.8" fill="url(#hLG)"/><circle cx="95.5" cy="50" r="1.8" fill="url(#hLG)"/>
      </svg>
      <div>
        <div class="logo-name">Beauty Black Room</div>
        <div class="logo-city">Мукачево</div>
      </div>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="/products.html" class="active">Продукти</a>
      <a href="/#categories">Каталог</a>
      <a href="/#gallery">Галерея</a>
      <a href="https://www.instagram.com/beauty_black_room_" target="_blank">Instagram</a>
      <a href="/#contacts">Контакти</a>
    </nav>
    <div class="nav-r">
      <a href="https://www.instagram.com/beauty_black_room_" target="_blank" class="nav-ig mag" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="currentColor" stroke="none"/></svg>
      </a>
      <button class="cart-toggle mag" id="cartToggle" aria-label="Кошик">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
      <a href="tel:+380995566006" class="btn btn-pink btn-sm mag">Подзвонити</a>
      <button class="burger" id="burger" aria-label="Меню"><span></span><span></span><span></span></button>
    </div>
  </header>

  <!-- MOBILE MENU -->
  <div class="mob-menu" id="mobMenu">
    <nav class="mob-nav">
      <a href="/products.html">Продукти</a>
      <a href="/#categories">Каталог</a>
      <a href="/#gallery">Галерея</a>
      <a href="https://www.instagram.com/beauty_black_room_" target="_blank">Instagram</a>
      <a href="/#contacts">Контакти</a>
    </nav>
  </div>

  <!-- CART SIDEBAR -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-head">
      <span class="cart-title">Кошик</span>
      <button class="cart-close" id="cartClose">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-foot">
      <div class="cart-total-row"><span>Разом</span><span id="cartTotal">0 ₴</span></div>
      <a href="tel:+380995566006" class="btn btn-pink" style="width:100%;text-align:center;display:block;">Замовити по телефону</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="catalog-page">
    <div class="catalog-header">
      <h1>Каталог товарів</h1>
      <p>Оригінальна косметика · Парфумерія · Догляд</p>
    </div>

    <div class="catalog-search">
      <input type="text" id="searchInput" placeholder="Пошук товарів..." />
    </div>

    <div class="catalog-controls" id="filterBtns">
      <button class="filter-btn" data-cat="">Всі</button>
      <button class="filter-btn" data-cat="face">Обличчя</button>
      <button class="filter-btn" data-cat="hair">Волосся</button>
      <button class="filter-btn" data-cat="body">Тіло</button>
      <button class="filter-btn" data-cat="men">Чоловіки</button>
      <button class="filter-btn" data-cat="perfumes">Парфуми</button>
      <button class="filter-btn" data-cat="home">Дім</button>
      <button class="filter-btn" data-cat="kids">Діти</button>
      <button class="filter-btn" data-cat="sale">Розпродаж</button>
    </div>

    <div id="catalogContent">
      <div class="catalog-loading">
        <div class="spinner"></div>
        <p>Завантаження товарів...</p>
      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
  <script type="module">
    import { db, collection, getDocs, query, where, orderBy }
      from './js/firebase-client.js';

    const CATEGORY_LABELS = {
      face: 'Обличчя', hair: 'Волосся', body: 'Тіло',
      men: 'Чоловіки', perfumes: 'Парфуми', home: 'Дім',
      kids: 'Діти', sale: 'Розпродаж'
    };

    let allProducts = [];
    // Підхоплюємо категорію з URL (?category=face)
    let activeCategory = new URLSearchParams(window.location.search).get('category') || '';
    let searchTerm = '';

    async function loadProducts() {
      try {
        const snap = await getDocs(query(collection(db, 'products'), orderBy('createdAt', 'desc')));
        allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderProducts();
      } catch (err) {
        document.getElementById('catalogContent').innerHTML =
          `<div class="catalog-empty">Помилка завантаження: ${err.message}</div>`;
      }
    }

    function renderProducts() {
      let filtered = allProducts;
      if (activeCategory) filtered = filtered.filter(p => p.category === activeCategory);
      if (searchTerm) filtered = filtered.filter(p =>
        p.name.toLowerCase().includes(searchTerm) ||
        (p.description || '').toLowerCase().includes(searchTerm)
      );

      if (!filtered.length) {
        document.getElementById('catalogContent').innerHTML =
          '<div class="catalog-empty">Товарів не знайдено</div>';
        return;
      }

      document.getElementById('catalogContent').innerHTML =
        `<div class="catalog-grid">${filtered.map(cardHTML).join('')}</div>`;

      document.querySelectorAll('.btn-add-cart').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const { id, name, price, img } = btn.dataset;
          if (typeof addToCart === 'function') addToCart({ id, name: name, price: Number(price), img });
        });
      });

      document.querySelectorAll('.catalog-card').forEach(card => {
        card.addEventListener('click', () => {
          window.location.href = `/product.html?id=${card.dataset.id}`;
        });
      });
    }

    function cardHTML(p) {
      const img = p.images?.[0] || 'images/hero.jpg';
      const cat = CATEGORY_LABELS[p.category] || p.category;
      return `
        <div class="catalog-card" data-id="${p.id}">
          <div class="catalog-card-img">
            <img src="${img}" alt="${p.name}" loading="lazy" />
            ${p.featured ? '<span class="catalog-card-badge">Хіт</span>' : ''}
          </div>
          <div class="catalog-card-body">
            <div class="catalog-card-cat">${cat}</div>
            <div class="catalog-card-name">${p.name}</div>
            <div class="catalog-card-desc">${p.description || ''}</div>
            <div class="catalog-card-footer">
              <div class="catalog-card-price">${p.price.toLocaleString('uk-UA')} <span>₴</span></div>
              <button class="btn-add-cart"
                data-id="${p.id}" data-name="${p.name}"
                data-price="${p.price}" data-img="${img}">
                + Кошик
              </button>
            </div>
          </div>
        </div>`;
    }

    // Filters
    document.getElementById('filterBtns').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      renderProducts();
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
      searchTerm = e.target.value.toLowerCase().trim();
      renderProducts();
    });

    // Підсвічуємо активну кнопку фільтра
    document.querySelectorAll('.filter-btn').forEach(btn => {
      if (btn.dataset.cat === activeCategory) btn.classList.add('active');
    });
    if (!activeCategory) document.querySelector('.filter-btn[data-cat=""]').classList.add('active');

    loadProducts();
  </script>
</body>
</html>
